<!DOCTYPE html>

<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KireiSakura-Kit</title>
		<style>
			:root {
				--base: #303446;
				--surface0: #292c3c;
				--text: #c6d0f5;
				--lavender: #babbf1;
			}

			body {
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				margin: 0;
				background-color: var(--base);
				font-family: Arial, sans-serif;
			}

			.box {
				padding: 20px;
				border-radius: 10px;
				background-color: var(--surface0);
				border: 2px solid var(--lavender);
				box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
				text-align: center;
			}

			h1 {
				font-size: 2.1rem;
				color: #f5b193;
				margin: 0;
			}

			h2 {
				font-size: 1.4rem;
				color: var(--text);
				margin: 20px 10px;
				margin-bottom: 5px;
			}
		</style>
	</head>
	<body>
		<div class="box">
			<h1>KireiSakura-Kit</h1>
			<h2>Documentation to be written</h2>
		</div>
	</body>
</html>
